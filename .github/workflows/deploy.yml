# ============================================================
# Workflow Deploy Frontend diaocthanhphat.com
# Build Vite + React + TypeScript và deploy lên hosting qua FTP
# ============================================================
name: Deploy Frontend

on:
  # Tự động chạy khi push lên branch main
  push:
    branches: [main]
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

# Chỉ 1 workflow chạy cùng lúc tránh ghi đè file trên hosting
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout mã nguồn
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 2. Cài Node.js 20
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Cài dependencies (npm ci dùng package-lock.json)
      - name: 📦 Install dependencies
        run: npm ci

      # 4. Build production (output ra thư mục dist/)
      # Vite tự copy public/.htaccess và public/robots.txt vào dist/
      - name: 🏗️ Build production
        run: npm run build

      # 5. (Tuỳ chọn) Kiểm tra thư mục dist đã tạo
      - name: ✅ Verify build output
        run: |
          echo "Danh sách file trong dist/:"
          ls -la dist/
          if [ ! -f dist/index.html ]; then
            echo "❌ Không tìm thấy dist/index.html — build thất bại!"
            exit 1
          fi
          echo "✅ Build OK, sẵn sàng deploy."

      # 6. Deploy lên hosting qua FTP (dùng GitHub Secrets)
      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/                       # Thư mục build ở local
          server-dir: ${{ secrets.FTP_TARGET_PATH }}  # vd: /public_html/
          exclude: |
            **/.git*
            **/.gitignore*
          # Không xóa file cũ trên server ngoài những file không còn trong dist
          # (đặt true nếu muốn đồng bộ hoàn toàn — cẩn thận sẽ xoá file khác)
          dangerous-clean-slate: false

