# ============================================================
# Workflow Deploy Frontend diaocthanhphat.com
# Build Vite + React + TypeScript và deploy lên hosting qua FTP
# ============================================================
name: Deploy Frontend

on:
  # Tự động chạy khi push lên branch main
  push:
    branches: [main]
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

# Chỉ 1 workflow chạy cùng lúc tránh ghi đè file trên hosting
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout mã nguồn
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      # 2. Cài Node.js 22
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      # 3. Cài dependencies (npm ci dùng package-lock.json)
      - name: 📦 Install dependencies
        run: npm ci

      # 4. Tạo file .env từ GitHub Secrets (bắt buộc vì .env bị .gitignore)
      # Vite cần VITE_SUPABASE_URL và VITE_SUPABASE_ANON_KEY khi build
      - name: 🔑 Create .env from secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "❌ Thiếu VITE_SUPABASE_URL hoặc VITE_SUPABASE_ANON_KEY trong GitHub Secrets!"
            echo "→ Vào Settings → Secrets and variables → Actions → Repository secrets"
            echo "→ Thêm: VITE_SUPABASE_URL và VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          echo "✅ Đã tạo .env từ secrets (giá trị đã ẩn)"

      # 5. Build production (output ra thư mục dist/)
      # Vite tự copy public/.htaccess và public/robots.txt vào dist/
      - name: 🏗️ Build production
        run: npm run build

      # 6. Kiểm tra thư mục dist đã tạo + verify env vars đã được inject
      - name: ✅ Verify build output
        run: |
          echo "Danh sách file trong dist/:"
          ls -la dist/
          if [ ! -f dist/index.html ]; then
            echo "❌ Không tìm thấy dist/index.html — build thất bại!"
            exit 1
          fi
          echo "✅ Build OK."
          # Kiểm tra Supabase URL đã được inject vào JS (chống trắng trang)
          if ! grep -rq 'supabase.co' dist/assets/*.js 2>/dev/null; then
            echo "❌ CẢNH BÁO: Không tìm thấy Supabase URL trong JS build!"
            echo "→ .env có thể chưa được tạo đúng. Kiểm tra lại secrets VITE_SUPABASE_URL."
            exit 1
          fi
          echo "✅ Supabase URL đã được inject vào JS — sẵn sàng deploy."

      # 7. Kiểm tra FTP GitHub Secrets có tồn tại (chỉ in độ dài, không in giá trị)
      - name: 🔍 Debug secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET_PATH: ${{ secrets.FTP_TARGET_PATH }}
        run: |
          echo "Kiểm tra độ dài từng secret (phải > 0):"
          echo "FTP_HOST length        = ${#FTP_HOST}"
          echo "FTP_USERNAME length    = ${#FTP_USERNAME}"
          echo "FTP_PASSWORD length    = ${#FTP_PASSWORD}"
          echo "FTP_TARGET_PATH length = ${#FTP_TARGET_PATH}"
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ] || [ -z "$FTP_TARGET_PATH" ]; then
            echo "❌ Một hoặc nhiều secret đang RỖNG!"
            echo "→ Vào Settings → Secrets and variables → Actions → Repository secrets"
            echo "→ Đảm bảo tạo ở mục 'Repository secrets' (KHÔNG phải Environment secrets)"
            echo "→ Tên phải chính xác: FTP_HOST, FTP_USERNAME, FTP_PASSWORD, FTP_TARGET_PATH"
            exit 1
          fi
          echo "✅ Tất cả secret đã có giá trị, tiếp tục deploy."

      # 8. Deploy lên hosting qua FTP (dùng GitHub Secrets)
      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/                       # Thư mục build ở local
          server-dir: ${{ secrets.FTP_TARGET_PATH }}  # vd: /public_html/
          exclude: |
            **/.git*
            **/.gitignore*
          # Không xóa file cũ trên server ngoài những file không còn trong dist
          # (đặt true nếu muốn đồng bộ hoàn toàn — cẩn thận sẽ xoá file khác)
          dangerous-clean-slate: false

